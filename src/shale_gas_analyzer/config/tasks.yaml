task_data_analysis:
  description: >
    深度分析页岩气井 {well_name} 的长周期生产数据。如果工具返回了“识别井名”，必须以工具从数据文件中识别出的真实井名为准。
    必须调用 read_shale_data_tool 获取历史全局概况和最近 30 条生产记录，再调用 calculate_decline_metrics_tool
    计算最近 30 条记录的递减、压力、产水、气水比和油套压差等指标。
    请结合全局和近期数据完成以下分析：
    1. 历史生产跨度、最高日产气、累计产气、累计产水等全局概况；
    2. 最近 30 条记录中日产气、日产水、套压和油压变化；
    3. 未来 5 天生产走势的定性预测；
    4. 捕捉突变、异常拐点或需要复核的数据质量问题。
  expected_output: >
    一份中文数据分析摘要，必须包含真实工具返回的关键数值、数据文件路径、最近 30 条记录趋势判断、
    未来 5 天走势预测和异常点说明。不得编造工具未提供的具体数值。

task_engineering_decision:
  description: >
    审阅数据分析结果，结合页岩气现场排采经验诊断目标井的主要生产矛盾。
    请重点判断井底积液、地层能量衰竭、裂缝闭合、节流制度不合理或数据异常的可能性。
    在给出工程建议前，必须根据数据分析结果构造检索问题，并调用 retrieve_engineering_knowledge_tool
    检索相关论文、规范、工艺知识或历史案例。
    检索 query 必须包含“当前井数据特征 + 疑似问题 + 候选措施”，例如：
    “日产气快速下降 气水比降低 油压波动 套压稳定 井底积液 泡沫排水 柱塞气举 产量递减”。
    最终建议必须同时包含：
    1. 数据依据；
    2. RAG 知识库依据，必须列出来源文件名，PDF 还要列出页码；
    3. 触发条件；
    4. 推荐措施；
    5. 风险提示；
    6. 复核指标。
    必须给出“是否需要干预：是/否”，并推荐最具性价比的排采或增产工艺。
  expected_output: >
    一份中文工程决策意见，必须包含问题诊断、数据依据、RAG 检索 query、RAG 来源列表、
    是否需要干预、推荐措施、触发条件、预期效果、风险提示、复核指标和优先级。
    如果 RAG 未启用、未构建或未检索到结果，必须明确写出“本次未检索到外部知识库依据”，不得编造来源。

task_write_final_report:
  description: >
    整合前序数据分析和工程决策，生成 Markdown 格式的《页岩气井生产状态分析与决策建议报告》。
    报告对象优先采用工具返回的“识别井名”；如果没有识别井名，再采用 {well_name}。
    必须包含以下章节：
    1. 生产现状概览；
    2. 最近 30 条记录核心指标和未来 5 天预测；
    3. RAG 检索依据；
    4. 主要生产矛盾诊断；
    5. 干预必要性评估，明确写出是/否；
    6. 具体工程措施、触发条件、执行优先级和复核建议。
    “RAG 检索依据”章节必须写出：
    - 检索 query；
    - 返回来源列表；
    - 至少 1 条 Markdown 工程知识来源；
    - 如果检索结果包含 PDF，必须列出 PDF 文件名和页码；
    - 每个来源如何支持当前诊断或措施建议。
    如果 RAG 没有启用或没有检索结果，报告中只能写“本次未检索到外部知识库依据”，不得编造来源文件、页码或案例。
  expected_output: >
    一份可直接归档的中文 Markdown 技术报告，标题必须为“页岩气井生产状态分析与决策建议报告”，
    结构清晰、结论明确、指标完整，并且必须包含可核查的 RAG 来源列表。
