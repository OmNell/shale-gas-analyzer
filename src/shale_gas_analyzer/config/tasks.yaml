task_data_analysis:
  description: >
    深度剖析页岩气井 {well_name} 的长周期生产数据。如果 {well_name} 为 AUTO，
    或工具返回了“识别井名”，必须以工具从 data 目录数据集中识别出的真实井名为准。
    必须调用 read_shale_data_tool
    获取历史全局概况和最近 30 天流水，再调用 calculate_decline_metrics_tool
    计算最近 30 天递减、压力消耗、产水、气水比和油套压差等指标。
    请结合全局和近期数据完成以下分析：
    1. 历史生产跨度、最高日产气、累计产气、累计产水等全局概况；
    2. 最近 30 天日产气、日产水、套压和油压变化；
    3. 未来 5 天生产走势的定性预测；
    4. 捕捉突变、异常拐点或需要复核的数据质量问题。
  expected_output: >
    一份中文数据分析摘要，必须包含真实工具返回的关键数值、最近 30 天趋势判断、
    未来 5 天走势预测和异常点说明。不得编造工具未提供的具体数值。

task_engineering_decision:
  description: >
    审阅数据分析结果，结合页岩气现场排采经验诊断目标井的主要生产矛盾。
    如果前序工具返回了“识别井名”，必须以该真实井名为准，而不是机械沿用输入占位符。
    请重点判断井底积液、地层能量衰竭、裂缝闭合、节流制度不合理或数据异常的可能性。
    必须给出“是否需要干预：是/否”，并推荐最具性价比的排采或增产工艺，例如泡沫排水采气、
    柱塞气举、清管、制度优化、重复压裂或持续观察。每一项建议都必须写明触发理由。
  expected_output: >
    一份中文工程决策意见，必须包含问题诊断、是否需要干预、推荐措施、触发理由、
    预期效果、风险提示和优先级。

task_write_final_report:
  description: >
    整合前序数据分析和工程决策，生成 Markdown 格式的《页岩气井生产状态分析与决策建议报告》。
    报告对象优先采用工具返回的“识别井名”；如果没有识别井名，再采用 {well_name}。必须包含：
    1. 生产现状概览；
    2. 最近 30 天核心指标和未来 5 天预测；
    3. 主要生产矛盾诊断；
    4. 干预必要性评估，明确写出是/否；
    5. 具体工程措施、触发条件、执行优先级和复核建议。
  expected_output: >
    一份可直接归档的中文 Markdown 技术报告，标题必须为
    “# 页岩气井生产状态分析与决策建议报告”，结构清晰、结论明确、指标完整。
